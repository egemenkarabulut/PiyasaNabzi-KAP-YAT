name: YAT KAP Merkezi Veri Güncelleme

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
      timezone: "Europe/Istanbul"

permissions:
  contents: write

concurrency:
  group: yat-kap-merkezi-veri
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Bağımlılıkları kur
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: KAP ve TEFAS merkezi verisini güncelle
        run: python scripts/update_public_data.py --workers 2 --delay 0.55

      - name: Değişiklikleri GitHub'a kaydet
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "Veride değişiklik yok; commit oluşturulmadı."
            exit 0
          fi

          git config user.name "Piyasa Nabzi Data Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git commit -m "data: YAT KAP merkezi verisini güncelle [skip ci]"
          git push
