name: YAT KAP Verisini Güncelle

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 0"
      timezone: "Europe/Istanbul"

permissions:
  contents: write

concurrency:
  group: yat-kap-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Depoyu al
        uses: actions/checkout@v6

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Parser testlerini çalıştır
        run: pytest -q

      - name: Tüm TEFAS YAT fonlarını güncelle
        env:
          KAP_WORKERS: "8"
          KAP_RETRIES: "3"
          TEFAS_LOOKBACK_DAYS: "7"
        run: |
          python scripts/update_yat_kap_data.py \
            --output data/yat_fund_enrichment.json

      - name: JSON temel doğrulama
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/yat_fund_enrichment.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          count = int(data.get("fund_count", 0))
          funds = data.get("funds", {})

          if count < 1500:
              raise SystemExit(f"Fon sayısı olağan dışı düşük: {count}")
          if count != len(funds):
              raise SystemExit(
                  f"fund_count ile funds uzunluğu uyuşmuyor: "
                  f"{count} != {len(funds)}"
              )

          print("Doğrulanan fon sayısı:", count)
          print(
              "İşlem durumları:",
              data.get("transaction_status_counts", {}),
          )
          PY

      - name: Değişen JSON'u repoya kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/yat_fund_enrichment.json

          if git diff --cached --quiet; then
            echo "JSON değişmedi; commit oluşturulmadı."
          else
            git commit -m "data: YAT KAP verisini güncelle [skip ci]"
            git push
          fi
